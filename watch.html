<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<meta name="robots" content="noindex,nofollow"/>
<title>AniWatch-BJ88 Watch</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Sarabun:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0c0c0c;--surface:#161616;--card:#1e1e1e;--card2:#262626;
  --border:#2a2a2a;--border2:#484848;
  --red:#c0392b;--red-h:#e74c3c;--red-dim:rgba(192,57,43,0.15);
  --gold:#d4a843;--gold-dim:rgba(212,168,67,0.12);--gold-line:#8a7040;
  --text:#f8f5ee;--text2:#d9c49e;--text3:#b09870;--green:#27ae60;
  --f-display:'Cinzel',serif;--f-body:'Sarabun',sans-serif;--f-mono:'Share Tech Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:var(--f-body);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--gold-line);border-radius:2px}

/* HEADER */
header{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200}
header::before{content:'';display:block;height:2px;background:linear-gradient(90deg,transparent,var(--red) 20%,var(--gold) 50%,var(--red) 80%,transparent)}
.header-wrap{max-width:1400px;margin:0 auto;padding:0 1rem;display:flex;align-items:center;gap:0.75rem;height:52px}
.logo{text-decoration:none;display:flex;align-items:center;gap:8px;flex-shrink:0}
.logo-svg{width:32px;height:32px;flex-shrink:0}
.logo-name{font-family:var(--f-display);font-size:0.85rem;font-weight:700;color:var(--text);letter-spacing:0.08em}
.logo-name span{color:var(--gold)}
.logo-sub{font-family:var(--f-mono);font-size:0.42rem;color:var(--text3);letter-spacing:0.15em;display:block;margin-top:1px}
.header-back{margin-left:auto;display:flex;align-items:center;gap:5px;color:var(--text2);text-decoration:none;font-size:0.78rem;padding:5px 10px;border:1px solid var(--border2);border-radius:2px;transition:all 0.2s;white-space:nowrap}
.header-back:hover{color:var(--gold);border-color:var(--gold-line)}

/* LOADING */
#loadingScreen{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem}
.spinner{width:40px;height:40px;border:3px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:var(--f-mono);font-size:0.65rem;color:var(--text3);letter-spacing:0.15em}

/* AD ZONES */
.ad-zone{display:flex;justify-content:center;background:var(--surface);border-bottom:1px solid var(--border)}
.ad-zone.empty{display:none}
.ad-zone img{width:100%;max-width:1280px;height:auto;display:block}
.ad-zone-bottom{border-top:1px solid var(--border);border-bottom:none}

/* LAYOUT */
.main-wrap{max-width:1400px;margin:0 auto}
@media(min-width:900px){
  .watch-layout{display:grid;grid-template-columns:1fr 340px;align-items:start}
  .player-col{position:sticky;top:52px}
  .ep-col{height:calc(100vh - 52px);overflow-y:auto;border-left:1px solid var(--border)}
}

/* PLAYER */
.player-wrap{position:relative;width:100%;background:#000;padding-bottom:56.25%;overflow:hidden}
@media(max-width:899px){.player-wrap{padding-bottom:62%}}
.player-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none;background:#000}
.player-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;background:#000;cursor:pointer}
.play-icon{width:64px;height:64px;border-radius:50%;background:rgba(192,57,43,0.85);display:flex;align-items:center;justify-content:center;transition:transform 0.2s,background 0.2s}
.player-placeholder:hover .play-icon,.player-placeholder:active .play-icon{background:var(--red);transform:scale(1.08)}
.player-placeholder p{font-size:0.78rem;color:var(--text3);font-family:var(--f-mono);letter-spacing:0.1em}

/* INFO */
.anime-info{padding:1rem 1.25rem;border-bottom:1px solid var(--border);background:var(--surface)}
.anime-title-th{font-size:1.05rem;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:2px}
.anime-title-en{font-family:var(--f-mono);font-size:0.58rem;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.75rem}
.meta-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:0.6rem}
.mbadge{font-family:var(--f-mono);font-size:0.56rem;letter-spacing:0.06em;padding:3px 8px;border-radius:1px;border:1px solid}
.mbadge.lang{background:var(--gold-dim);color:var(--gold);border-color:var(--gold-line)}
.mbadge.info{background:var(--card2);color:var(--text2);border-color:var(--border2)}
.mbadge.airing{background:var(--red-dim);color:var(--red-h);border-color:rgba(192,57,43,0.4)}
.mbadge.done{background:rgba(39,174,96,0.1);color:var(--green);border-color:rgba(39,174,96,0.3)}
.anime-desc{font-size:0.82rem;color:var(--text2);line-height:1.65;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.desc-more{display:inline-block;margin-top:4px;font-size:0.72rem;color:var(--gold);cursor:pointer;font-family:var(--f-mono)}

/* LANG TABS */
.lang-row{display:flex;align-items:center;gap:8px;padding:0.7rem 1.25rem;border-bottom:1px solid var(--border);background:var(--card)}
.lang-label{font-family:var(--f-mono);font-size:0.58rem;color:var(--text3);letter-spacing:0.08em}
.lang-tab{font-family:var(--f-mono);font-size:0.6rem;padding:4px 12px;border-radius:1px;border:1px solid var(--border2);color:var(--text3);cursor:pointer;background:none;transition:all 0.15s;min-height:30px}
.lang-tab.active{background:var(--gold-dim);color:var(--gold);border-color:var(--gold-line)}
.lang-tab:disabled{opacity:0.3;cursor:not-allowed}

/* EP NAV */
.ep-nav{display:flex;align-items:center;gap:8px;padding:0.7rem 1.25rem;border-bottom:1px solid var(--border);background:var(--surface)}
.ep-nav-btn{display:flex;align-items:center;gap:4px;background:var(--card2);border:1px solid var(--border2);color:var(--text2);font-family:var(--f-body);font-size:0.78rem;font-weight:600;padding:6px 12px;border-radius:1px;cursor:pointer;transition:all 0.15s;min-height:38px;-webkit-tap-highlight-color:transparent}
.ep-nav-btn:hover:not(:disabled){border-color:var(--gold-line);color:var(--gold)}
.ep-nav-btn:disabled{opacity:0.3;cursor:not-allowed}
.ep-current{flex:1;text-align:center;font-family:var(--f-mono);font-size:0.68rem;color:var(--text2);letter-spacing:0.06em}

/* EP LIST */
.ep-list-head{padding:0.85rem 1.25rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--card)}
.ep-list-title{font-family:var(--f-display);font-size:0.75rem;font-weight:700;color:var(--text);letter-spacing:0.08em}
.ep-count{font-family:var(--f-mono);font-size:0.55rem;background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-line);padding:2px 7px;border-radius:1px}
.ep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(58px,1fr));gap:4px;padding:0.85rem 1.25rem}
.ep-btn{background:var(--card2);border:1px solid var(--border);color:var(--text2);font-family:var(--f-mono);font-size:0.7rem;padding:8px 4px;text-align:center;border-radius:2px;cursor:pointer;transition:all 0.15s;min-height:42px;display:flex;flex-direction:column;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;user-select:none}
.ep-btn:hover{border-color:var(--gold-line);color:var(--gold)}
.ep-btn.active{background:var(--red);border-color:var(--red);color:white;font-weight:700}
.ep-btn .ep-dot{width:4px;height:4px;border-radius:50%;background:var(--gold);margin-top:3px}
.ep-btn.active .ep-dot{background:rgba(255,255,255,0.6)}

/* BOTTOM BAR */
.back-bar{text-align:center;padding:1.5rem 1rem;border-top:1px solid var(--border);background:var(--surface)}
.back-bar a{color:var(--text3);text-decoration:none;font-size:0.78rem;font-family:var(--f-mono);letter-spacing:0.06em;transition:color 0.2s}
.back-bar a:hover{color:var(--gold)}
.back-bar p{font-size:0.6rem;color:var(--text3);margin-top:6px;font-family:var(--f-mono);opacity:0.7}

/* ERROR */
.error-wrap{padding:3rem 1.5rem;text-align:center;display:flex;flex-direction:column;align-items:center;gap:1rem}
.error-code{font-family:var(--f-display);font-size:3rem;font-weight:700;color:var(--red)}
.error-msg{color:var(--text2);font-size:0.9rem}
.error-btn{background:var(--red);color:white;border:none;font-family:var(--f-body);font-size:0.85rem;font-weight:700;padding:0.65rem 1.5rem;border-radius:1px;cursor:pointer;text-decoration:none;display:inline-block;margin-top:0.5rem}

/* MOBILE */
@media(max-width:899px){
  .anime-info{padding:0.85rem 1rem}
  .anime-title-th{font-size:1rem}
  .lang-row,.ep-nav{padding:0.6rem 1rem}
  .ep-grid{padding:0.75rem;gap:5px}
}

/* iOS Safari */
@supports(-webkit-touch-callout:none){
  .player-wrap{-webkit-overflow-scrolling:touch}
}
</style>
</head>
<body>

<div id="loadingScreen">
  <div class="spinner"></div>
  <div class="loading-text">กำลังโหลด...</div>
</div>

<header>
  <div class="header-wrap">
    <a class="logo" href="https://anime.bj88la.net">
      <svg class="logo-svg" viewBox="0 0 40 40" fill="none">
        <polygon points="20,1 38,10 38,30 20,39 2,30 2,10" fill="#0a0a08" stroke="#c9a84c" stroke-width="1.2"/>
        <polygon points="20,5 34,12.5 34,27.5 20,35 6,27.5 6,12.5" fill="none" stroke="#6b5a2a" stroke-width="0.5"/>
        <text x="20" y="18" text-anchor="middle" font-family="Cinzel,serif" font-size="8" font-weight="900" fill="#c9a84c">AW</text>
        <line x1="10" y1="21" x2="30" y2="21" stroke="#6b5a2a" stroke-width="0.5"/>
        <text x="20" y="28" text-anchor="middle" font-family="Cinzel,serif" font-size="5.5" font-weight="700" fill="#8a6a30" letter-spacing="1">BJ88</text>
      </svg>
      <div>
        <span class="logo-name">ANIWATCH<span>-BJ88</span></span>
        <span class="logo-sub">watch.b88l.net</span>
      </div>
    </a>
    <a class="header-back" href="https://anime.bj88la.net">← กลับหน้าหลัก</a>
  </div>
</header>

<div class="ad-zone empty" id="adTop"></div>

<div class="main-wrap">
  <div id="errorWrap" class="error-wrap" style="display:none">
    <div class="error-code">404</div>
    <div class="error-msg">ไม่พบอนิเมะนี้</div>
    <a class="error-btn" href="https://anime.bj88la.net">← กลับหน้าหลัก</a>
  </div>

  <div id="watchApp" class="watch-layout" style="display:none">

    <div class="player-col">

      <div class="player-wrap" id="playerWrap">
        <div class="player-placeholder" id="playerPlaceholder" onclick="loadPlayer()">
          <div class="play-icon">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="white" style="margin-left:3px"><polygon points="5,3 19,12 5,21"/></svg>
          </div>
          <p>แตะเพื่อดู</p>
        </div>
      </div>

      <div class="anime-info">
        <div class="anime-title-th" id="animeTitleTh">—</div>
        <div class="anime-title-en" id="animeTitleEn">—</div>
        <div class="meta-row" id="animeMeta"></div>
        <div class="anime-desc" id="animeDesc"></div>
        <span class="desc-more" id="descMore" onclick="toggleDesc()" style="display:none">อ่านเพิ่มเติม ▾</span>
      </div>

      <div class="lang-row">
        <span class="lang-label">ภาษา:</span>
        <button class="lang-tab active" id="tabSub" onclick="setLang('sub')">ซับไทย</button>
        <button class="lang-tab" id="tabDub" onclick="setLang('dub')">พากย์ไทย</button>
      </div>

      <div class="ep-nav">
        <button class="ep-nav-btn" id="btnPrev" onclick="goEp(-1)" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15,18 9,12 15,6"/></svg>
          ก่อนหน้า
        </button>
        <div class="ep-current" id="epCurrent">ตอนที่ —</div>
        <button class="ep-nav-btn" id="btnNext" onclick="goEp(1)">
          ถัดไป
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9,18 15,12 9,6"/></svg>
        </button>
      </div>

    </div>

    <div class="ep-col">
      <div class="ep-list-head">
        <span class="ep-list-title">รายการตอน</span>
        <span class="ep-count" id="epCount">0 ตอน</span>
      </div>
      <div class="ep-grid" id="epGrid"></div>
    </div>

  </div>
</div>

<div class="ad-zone ad-zone-bottom empty" id="adBottom"></div>

<div class="back-bar">
  <a href="https://anime.bj88la.net">← ดูอนิเมะทั้งหมดที่ anime.bj88la.net</a>
  <p>⚠️ เว็บนี้ไม่ได้โฮสต์วิดีโอใดๆ — วิดีโอเชื่อมต่อจากแหล่งต้นฉบับ</p>
</div>

<script>
const MAIN = 'https://anime.bj88la.net';
const SRC  = 'https://anime-th.com';
const SB   = 'https://pzrzdljwglybljthbffl.supabase.co';
const KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB6cnpkbGp3Z2x5YmxqdGhiZmZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NzczNjUsImV4cCI6MjA5MDI1MzM2NX0.HzAKYcSQ_kjlKrf-HQSwVdwi_-J8aBnP6HinMDjfkTA';
const SB_H = { 'apikey': KEY, 'Authorization': `Bearer ${KEY}` };
const SITE_ID = 1;

let anime = null, episodes = [], curEp = 1, curLang = 'sub';
let playerLoaded = false, descExp = false;
const P = new URLSearchParams(location.search);

const el = id => document.getElementById(id);

async function sbGet(path) {
  const r = await fetch(`${SB}/rest/v1/${path}`, { headers: SB_H });
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

async function init() {
  const slug = P.get('slug');
  const epNum = parseInt(P.get('ep')) || 1;
  if (!slug) { showErr(); return; }

  try {
    // Load anime
    const rows = await sbGet(`anime?site_id=eq.${SITE_ID}&slug=eq.${encodeURIComponent(slug)}&select=*&limit=1`);
    if (!rows?.length) { showErr(); return; }
    anime = rows[0];

    // Load episodes
    const epRows = await sbGet(`episodes?anime_id=eq.${anime.id}&order=number&select=*`);
    episodes = epRows || [];

    // Fallback: generate from count
    if (!episodes.length && anime.episode_count > 0) {
      episodes = Array.from({ length: anime.episode_count }, (_, i) => ({
        id: null, number: i+1,
        title: `EP.${String(i+1).padStart(2,'0')}`,
        has_sub: true, has_dub: false, video_url: null
      }));
    }

    // Parallel: load banners
    loadBanners();

    renderInfo();
    renderEps();
    curEp = Math.min(epNum, episodes.length || 1);
    selectEp(curEp, false);

    el('loadingScreen').style.display = 'none';
    el('watchApp').style.display = '';

  } catch(e) {
    console.error(e);
    showErr();
  }
}

function renderInfo() {
  const title = (anime.title_th || anime.slug || '')
    .replace(/\s*[-–]\s*Anime\s*TH\s*$/i, '').trim();
  el('animeTitleTh').textContent = title;
  el('animeTitleEn').textContent = (anime.title_en || '').toUpperCase();
  document.title = `${title} | AniWatch-BJ88`;

  const s = anime.status || 'airing';
  const sLabel = {airing:'• ออกอากาศ',complete:'• จบแล้ว',upcoming:'เร็วๆ นี้'}[s] || '';
  const sClass = {airing:'airing',complete:'done',upcoming:'airing'}[s] || '';

  el('animeMeta').innerHTML =
    `<span class="mbadge lang">ซับไทย</span>` +
    (anime.episode_count ? `<span class="mbadge info">${anime.episode_count} ตอน</span>` : '') +
    (anime.year ? `<span class="mbadge info">${anime.year}</span>` : '') +
    (sLabel ? `<span class="mbadge ${sClass}">${sLabel}</span>` : '') +
    (anime.genres||[]).slice(0,2).map(g=>`<span class="mbadge info">${g}</span>`).join('');

  const desc = anime.description || anime.desc || '';
  if (desc) { el('animeDesc').textContent = desc; el('descMore').style.display='inline-block'; }

  const hasDub = episodes.some(e => e.has_dub);
  el('tabDub').disabled = !hasDub;
  if (!hasDub) el('tabDub').style.opacity = '0.3';
}

function renderEps() {
  el('epCount').textContent = `${episodes.length} ตอน`;
  el('epGrid').innerHTML = episodes.map(ep => {
    const n = String(ep.number).padStart(2,'0');
    const hasSub = ep.has_sub !== false;
    return `<div class="ep-btn" id="ep-${ep.number}" onclick="selectEp(${ep.number},true)">
      EP.${n}${hasSub ? '<div class="ep-dot"></div>' : ''}
    </div>`;
  }).join('');
}

function selectEp(num, play) {
  curEp = num;
  playerLoaded = false;
  document.querySelectorAll('.ep-btn').forEach(b => b.classList.remove('active'));
  const btn = el(`ep-${num}`);
  if (btn) { btn.classList.add('active'); btn.scrollIntoView({behavior:'smooth',block:'nearest'}); }

  el('epCurrent').textContent = `ตอนที่ ${String(num).padStart(2,'0')} / ${String(episodes.length).padStart(2,'0')}`;
  el('btnPrev').disabled = num <= 1;
  el('btnNext').disabled = num >= episodes.length;

  const u = new URL(location.href);
  u.searchParams.set('ep', num);
  history.replaceState({}, '', u);

  const wrap = el('playerWrap');
  const old = wrap.querySelector('iframe');
  if (old) old.remove();
  el('playerPlaceholder').style.display = 'flex';

  if (play) {
    if (window.innerWidth < 900) wrap.scrollIntoView({behavior:'smooth',block:'start'});
    loadPlayer();
  }
}

function loadPlayer() {
  if (playerLoaded) return;
  playerLoaded = true;
  el('playerPlaceholder').style.display = 'none';

  const slug = anime.slug;
  const ep = episodes.find(e => e.number === curEp);
  const src = (ep?.video_url) ? ep.video_url : `${SRC}/anime/${slug}/`;

  const iframe = document.createElement('iframe');
  iframe.src = src;
  iframe.setAttribute('allowfullscreen','');
  iframe.setAttribute('allow','fullscreen; autoplay');
  iframe.setAttribute('sandbox','allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-presentation');
  iframe.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;border:none;background:#000';
  el('playerWrap').appendChild(iframe);
}

function goEp(dir) {
  const n = curEp + dir;
  if (n < 1 || n > episodes.length) return;
  selectEp(n, true);
}

function setLang(lang) {
  curLang = lang;
  el('tabSub').classList.toggle('active', lang==='sub');
  el('tabDub').classList.toggle('active', lang==='dub');
  if (playerLoaded) { playerLoaded=false; loadPlayer(); }
}

function toggleDesc() {
  descExp = !descExp;
  const d = el('animeDesc');
  d.style.webkitLineClamp = descExp ? 'unset' : '3';
  d.style.overflow = descExp ? 'visible' : 'hidden';
  el('descMore').textContent = descExp ? 'ย่อลง ▴' : 'อ่านเพิ่มเติม ▾';
}

async function loadBanners() {
  try {
    const data = await sbGet(`banners?site_id=eq.${SITE_ID}&enabled=eq.true&select=*&order=slot_id,sort_order`);
    ['leaderboard-top','leaderboard-footer'].forEach((slot, i) => {
      const zone = i===0 ? el('adTop') : el('adBottom');
      const items = data.filter(b => b.slot_id === slot);
      if (!items.length) return;
      zone.classList.remove('empty');
      zone.innerHTML = items.map(b => {
        if (b.html_code) return b.html_code;
        if (b.img_url) {
          const a = b.click_url ? `<a href="${b.click_url}" target="_blank" rel="noopener sponsored">` : '<div>';
          const z = b.click_url ? '</a>' : '</div>';
          return `${a}<img src="${b.img_url}" alt="ad" style="width:100%;height:auto;display:block">${z}`;
        }
        return '';
      }).join('');
    });
  } catch(e) {}
}

function showErr() {
  el('loadingScreen').style.display = 'none';
  el('errorWrap').style.display = 'flex';
}

init();
</script>
</body>
</html>
