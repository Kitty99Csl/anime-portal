name: Weekly Data Sync

on:
  schedule:
    - cron: '0 20 * * 0'  # Sunday 3am Bangkok (UTC+7) = Sunday 8pm UTC
  workflow_dispatch:       # Manual trigger from Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    permissions:
      contents: write  # needed to push anime.json + sitemap back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run scraper
        run: node scripts/scraper.js
        working-directory: .

      - name: Generate sitemap
        run: node scripts/generate-sitemap.js
        working-directory: .
        continue-on-error: true  # don't block commit if sitemap fails

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/anime.json src/data/episodes.json public/sitemap.xml
          git diff --cached --quiet || git commit -m "chore: weekly data sync $(date +'%Y-%m-%d')"
          git push
