name: Weekly Data Sync
on:
  schedule:
    - cron: '0 20 * * 6'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install axios cheerio --prefix ./scripts
      - name: Run scraper
        run: node scripts/scraper.js
      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add src/data/
          git diff --staged --quiet || git commit -m "chore: weekly data sync"
          git push
