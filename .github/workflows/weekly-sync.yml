name: Weekly Data Sync

on:
  schedule:
    - cron: '0 20 * * 6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run scraper
        run: node scripts/scraper.js

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/anime.json src/data/episodes.json
          git diff --staged --quiet && echo "No changes" || \
            git commit -m "chore: weekly anime sync $(date +'%Y-%m-%d')"
          git push
