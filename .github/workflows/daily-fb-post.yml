name: Daily Facebook Post

on:
  schedule:
    # 8:00 AM Bangkok (ICT) = 01:00 UTC
    - cron: '0 1 * * *'
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab for testing

jobs:
  generate-caption:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Lao caption and save to Supabase
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_KEY:   ${{ secrets.GEMINI_KEY }}
        run: node scripts/fb-poster.js
